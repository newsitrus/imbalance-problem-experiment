# Configuration for Tourism Sentiment Analysis Experiment
# Based on: "Advancing tourism sentiment analysis" (Srianan et al., 2025)

# =============================================================================
# Data Configuration
# =============================================================================
data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  splits_path: "data/splits/"
  train_ratio: 0.7
  test_ratio: 0.3
  random_state: 42

  # Expected dataset statistics
  expected_total_reviews: 505980
  expected_positive_ratio: 0.8211
  expected_negative_ratio: 0.1789

# =============================================================================
# Preprocessing Configuration
# =============================================================================
preprocessing:
  lowercase: true
  remove_punctuation: true
  remove_extra_spaces: true
  remove_stopwords: true
  lemmatize: true
  min_review_length: 1  # Minimum tokens after preprocessing

# =============================================================================
# Sentiment Labeling
# =============================================================================
labeling:
  # Ratings 1-3 -> Negative (0), Ratings 4-5 -> Positive (1)
  negative_ratings: [1, 2, 3]
  positive_ratings: [4, 5]
  negative_label: 0
  positive_label: 1

# =============================================================================
# TF-IDF Configuration (Traditional ML)
# =============================================================================
tfidf:
  ngram_range: [1, 2]
  max_features: 5000

# =============================================================================
# Traditional ML Models Configuration
# =============================================================================
traditional_ml:
  naive_bayes:
    # MultinomialNB default parameters
    alpha: 1.0

  logistic_regression:
    random_state: 42
    max_iter: 1000
    solver: "lbfgs"

  svm:
    kernel: "linear"
    random_state: 42
    C: 1.0

# =============================================================================
# Deep Learning Configuration
# =============================================================================
deep_learning:
  # Common parameters
  learning_rate: 0.001
  batch_size: 64
  num_epochs: 5
  embedding_dim: 128
  hidden_dim: 128
  dropout: 0.5

  # Optimizer
  optimizer: "Adam"
  weight_decay: 0.0

  # Loss function
  loss_function: "CrossEntropyLoss"

  # Vocabulary
  max_vocab_size: 50000
  max_sequence_length: 256

  # CNN specific
  cnn:
    kernel_sizes: [3, 4, 5]
    num_filters: 100

  # LSTM specific
  lstm:
    num_layers: 1
    bidirectional: true

  # GRU specific
  gru:
    num_layers: 1
    bidirectional: true

# =============================================================================
# RoBERTa Configuration
# =============================================================================
roberta:
  # Base model
  model_name: "cardiffnlp/twitter-roberta-base-sentiment"

  # Tokenizer settings
  max_length: 512
  padding: "max_length"
  truncation: true

  # Training settings
  batch_size: 64
  num_epochs: 5
  learning_rate: 0.00002  # 2e-5

  # Dropout
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1

  # Optimizer
  optimizer: "AdamW"
  weight_decay: 0.01
  warmup_ratio: 0.1

  # Fine-tuning
  num_labels: 2
  gradient_accumulation_steps: 1
  fp16: false  # Set true if GPU supports mixed precision

# =============================================================================
# Oversampling Configuration
# =============================================================================
oversampling:
  smote:
    k_neighbors: 5
    random_state: 42
    sampling_strategy: "auto"

  adasyn:
    n_neighbors: 5
    random_state: 42
    sampling_strategy: "auto"

  random_oversampler:
    random_state: 42
    sampling_strategy: "auto"

# =============================================================================
# Evaluation Metrics
# =============================================================================
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - balanced_accuracy
    - cohen_kappa

  # For confusion matrix
  class_names: ["Negative", "Positive"]

  # Save predictions for analysis
  save_predictions: true

# =============================================================================
# Output Configuration
# =============================================================================
output:
  models_dir: "outputs/models/"
  results_dir: "outputs/results/"
  figures_dir: "outputs/figures/"
  logs_dir: "outputs/logs/"

  # Checkpoint saving
  save_best_only: true
  save_format: "pt"  # For PyTorch models

# =============================================================================
# Experiment Configuration
# =============================================================================
experiment:
  name: "tourism_sentiment_analysis"
  description: "Reproduction of Srianan et al. (2025)"

  # Which experiments to run
  run_traditional_ml: true
  run_deep_learning: true
  run_transformer: true

  # Which oversampling to apply
  oversamplers: ["none", "smote", "adasyn", "random_oversampler"]

  # Logging
  verbose: true
  log_interval: 100  # For DL training

# =============================================================================
# Hardware Configuration
# =============================================================================
hardware:
  device: "auto"  # "auto", "cuda", "mps", or "cpu"
  num_workers: 4
  pin_memory: true
