experiment:
  # ── Datasets (subset chosen for reproducibility + full IR coverage) ──────────
  # haberman     : n=306,  d=3,  IR=2.78   low IR
  # ecoli3       : n=336,  d=7,  IR=8.60   medium IR
  # vowel0       : n=988,  d=10, IR=9.98   medium-high IR  (ICTLB wins all 3 metrics)
  # shuttle-2vs5 : n=3316, d=9,  IR=66.67  extreme IR
  datasets: [haberman, ecoli3, vowel0, shuttle-2vs5]

  # ── Methods (only fully-specified methods retained) ──────────────────────────
  # density-k-means++ is used as INITIALISER for all methods (required by paper)
  # but is not run as a standalone comparison column because its exact
  # implementation depends on a separate paper [31] not detailed here.
  # SMCL / DEC / IDEC are excluded (not fully specified in the ICTLB paper).
  methods: [kmeans, kmeanspp, macw, ictlb]

  n_runs: 10          # paper value (Section IV-D: "run each algorithm ten times")
  random_seed: 42     # base seed; each run uses seed + run_idx for reproducibility

paths:
  data_dir: data/
  results_dir: results/

algorithm:
  alpha: -0.5         # Eq. 13 / 36 exponent; paper fixes α = -1/2 (Section IV-A)
  max_iter: 300       # not specified in paper; 300 is standard k-means practice
  tol: 1.0e-4         # center-shift convergence tolerance (standard)
  n_neighbors_density: 5   # kNN for density estimation in density-k-means++ init

  # ── ICTLB W parameter (Section IV-E) ────────────────────────────────────────
  # Paper: "fix one constant W = 2 and tune another constant W"
  # For k=2: W = [W_fixed, W_tuned]
  # W_fixed is set to 2.0 (paper's recommended default).
  # W_tuned is grid-searched from ictlb_W_grid.
  # This reduces search from 36 combos (6×6) to 6 combos — paper-validated shortcut.
  ictlb_W_fixed: 2.0
  ictlb_W_grid: [0.1, 0.2, 0.3, 1.0, 2.0, 3.0]   # full W grid (Section IV-E)

# ── Paper reference values (qualitative) ────────────────────────────────────────
# Tables III–VI are vector-image graphics in the PDF; numeric values are not
# extractable.  The claims below come directly from Section IV-D (pp. 9606–9607).
# They are used in the notebook comparison table.
paper_results:
  haberman:
    ICTLB_best_metrics: [ACC, F-score]
    notes: "ICTLB best ACC + F-score; Recall lower than k-means"
  ecoli3:
    ICTLB_best_metrics: [ACC, F-score]
    notes: "ICTLB best ACC + F-score; Recall lower than MACW"
  vowel0:
    ICTLB_best_metrics: [ACC, F-score, Recall]
    notes: "ICTLB best on ALL three metrics — cleanest win in the paper"
  shuttle-2vs5:
    ICTLB_best_metrics: [ACC, F-score]
    notes: "ICTLB best ACC + F-score; Recall tied with other methods"
  general:
    - "ICTLB consistently outperforms MACW (theoretical bound optimisation helps)"
    - "ICTLB consistently outperforms k-means (adaptive weighting helps)"
    - "k-means and k-means++ perform similarly (init matters less than weighting)"
